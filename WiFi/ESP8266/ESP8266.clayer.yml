# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/schemas/projmgr/1.4.0/tools/projmgr/schemas/clayer.schema.json

layer:
  # type: WiFiDriver
  # name: ESP8266
  description: ESP8266 WiFi interface

   connections:
     - connect: ESP8266
       consumes:
        - RTOS2
        - A_UART: *    # Arduino module
       provides:
        - C_WiFi: 0    # Arduino module

  # packs:
  #   - pack: ARM::CMSIS
  #   - pack: ARM::CMSIS-Driver
  #   - pack: Keil::ARM_Compiler

  # add-path:
  #   - .

  components:
    - component: Keil::CMSIS Driver:WiFi:ESP8266&UART
